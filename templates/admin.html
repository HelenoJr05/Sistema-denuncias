<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel Administrativo — Denúncias</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
      padding: 30px 20px;
    }

    .header {
      max-width: 1100px;
      margin: 0 auto 30px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 { color: #f0f6fc; font-size: 1.5rem; }
    .header p { color: #8b949e; font-size: 0.85rem; margin-top: 4px; }

    .stats {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      max-width: 1100px;
      margin: 0 auto 30px;
    }

    .stat-card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 18px 24px;
      min-width: 150px;
    }

    .stat-card .num { font-size: 2rem; font-weight: 700; color: #58a6ff; }
    .stat-card .label { font-size: 0.8rem; color: #8b949e; margin-top: 4px; }

    .btn {
      padding: 9px 18px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 600;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.8; }
    .btn-primary { background: #238636; color: #fff; }
    .btn-secondary { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }

    .search-bar {
      max-width: 1100px;
      margin: 0 auto 20px;
      display: flex;
      gap: 10px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #c9d1d9;
      font-size: 0.9rem;
      outline: none;
    }
    .search-bar input:focus { border-color: #58a6ff; }

    .table-wrapper {
      max-width: 1100px;
      margin: 0 auto;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: #21262d; }

    th {
      padding: 14px 16px;
      text-align: left;
      font-size: 0.8rem;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }

    td {
      padding: 14px 16px;
      border-top: 1px solid #21262d;
      font-size: 0.88rem;
      vertical-align: top;
    }

    tr:hover td { background: rgba(255,255,255,0.02); }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-green { background: rgba(35,134,54,0.2); color: #3fb950; border: 1px solid rgba(35,134,54,0.3); }
    .badge-yellow { background: rgba(210,153,34,0.2); color: #d29922; border: 1px solid rgba(210,153,34,0.3); }

    .protocolo-code {
      font-family: monospace;
      font-size: 0.82rem;
      color: #79c0ff;
      background: rgba(121,192,255,0.08);
      padding: 2px 7px;
      border-radius: 5px;
    }

    .truncate { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }
    .truncate:hover { white-space: normal; }

    #loading, #empty {
      text-align: center;
      padding: 50px;
      color: #8b949e;
    }

    .btn-back {
      display: inline-block;
      color: #58a6ff;
      text-decoration: none;
      font-size: 0.85rem;
    }
    .btn-back:hover { text-decoration: underline; }

    @media (max-width: 700px) {
      th:nth-child(n+4), td:nth-child(n+4) { display: none; }
    }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>📋 Painel Administrativo</h1>
    <p>Sistema de Denúncias Anônimas — Combate à Homofobia</p>
    <a class="btn-back" href="index.html">← Voltar ao formulário</a>
  </div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-secondary" onclick="carregarDenuncias()">🔄 Atualizar</button>
  </div>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="num" id="stat-total">—</div>
    <div class="label">Total de Denúncias</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-hoje">—</div>
    <div class="label">Hoje</div>
  </div>
  <div class="stat-card">
    <div class="num" id="stat-recebidas">—</div>
    <div class="label">Recebidas</div>
  </div>
</div>

<div class="search-bar">
  <input type="text" id="busca" placeholder="🔍 Filtrar por protocolo, local, tipo..." oninput="filtrar()" />
</div>

<div class="table-wrapper">
  <div id="loading">⏳ Carregando denúncias...</div>
  <div id="empty" style="display:none;">📭 Nenhuma denúncia encontrada.</div>
  <table id="tabela" style="display:none;">
    <thead>
      <tr>
        <th>Protocolo</th>
        <th>Data do Ocorrido</th>
        <th>Tipo</th>
        <th>Local</th>
        <th>Descrição</th>
        <th>Status</th>
        <th>Registrado em</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
  // ⚠️ Substitua pela URL do seu API Gateway após o deploy
  const API_URL = "https://cr8zw9p6v2.execute-api.us-east-1.amazonaws.com/prod";

  let todasDenuncias = [];

  async function carregarDenuncias() {
    document.getElementById("loading").style.display = "block";
    document.getElementById("tabela").style.display = "none";
    document.getElementById("empty").style.display = "none";

    try {
      const res = await fetch(`${API_URL}/admin/denuncias`);
      const data = await res.json();
      todasDenuncias = data.denuncias || [];
      renderizar(todasDenuncias);
      calcularStats(todasDenuncias);
    } catch (err) {
      document.getElementById("loading").textContent = "❌ Erro ao carregar dados: " + err.message;
    }
  }

  function calcularStats(lista) {
    const hoje = new Date().toISOString().slice(0, 10);
    const qtdHoje = lista.filter(d => (d.data_registro || "").startsWith(hoje)).length;
    const qtdRecebidas = lista.filter(d => d.status === "Recebida").length;

    document.getElementById("stat-total").textContent = lista.length;
    document.getElementById("stat-hoje").textContent = qtdHoje;
    document.getElementById("stat-recebidas").textContent = qtdRecebidas;
  }

  function filtrar() {
    const termo = document.getElementById("busca").value.toLowerCase();
    const filtradas = todasDenuncias.filter(d =>
      (d.protocolo || "").toLowerCase().includes(termo) ||
      (d.local_ocorrido || "").toLowerCase().includes(termo) ||
      (d.tipo_ocorrido || "").toLowerCase().includes(termo) ||
      (d.descricao_ocorrido || "").toLowerCase().includes(termo)
    );
    renderizar(filtradas);
  }

  function renderizar(lista) {
    document.getElementById("loading").style.display = "none";
    const tbody = document.getElementById("tbody");
    tbody.innerHTML = "";

    if (lista.length === 0) {
      document.getElementById("empty").style.display = "block";
      document.getElementById("tabela").style.display = "none";
      return;
    }

    document.getElementById("tabela").style.display = "table";
    document.getElementById("empty").style.display = "none";

    lista.forEach(d => {
      const dataRegistro = d.data_registro ? new Date(d.data_registro).toLocaleString("pt-BR") : "—";
      const badgeClass = d.status === "Recebida" ? "badge-green" : "badge-yellow";

      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><span class="protocolo-code">${d.protocolo || "—"}</span></td>
        <td>${d.data_hora_formatada || d.data_ocorrido || "—"}</td>
        <td>${d.tipo_ocorrido || "—"}</td>
        <td class="truncate" title="${d.local_ocorrido || ""}">${d.local_ocorrido || "—"}</td>
        <td class="truncate" title="${d.descricao_ocorrido || ""}">${d.descricao_ocorrido || "—"}</td>
        <td><span class="badge ${badgeClass}">${d.status || "—"}</span></td>
        <td style="white-space:nowrap">${dataRegistro}</td>
      `;
      tbody.appendChild(tr);
    });
  }

  carregarDenuncias();
</script>

</body>
</html>
